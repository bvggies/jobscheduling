  <ellipse cx="1580" cy="220" rx="400" ry="320" fill="url(#g2)" filter="url(#blur)" opacity="0.85"/>
  <ellipse cx="1400" cy="920" rx="600" ry="400" fill="url(#g3)" filter="url(#blur)" opacity="0.75"/>
  <ellipse cx="200" cy="800" rx="380" ry="300" fill="url(#g4)" filter="url(#blur)" opacity="0.8"/>
