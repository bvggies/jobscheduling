<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="40%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="g1" cx="25%" cy="20%" r="55%">
      <stop offset="0%" style="stop-color:#3b5bdb;stop-opacity:0.55"/>
      <stop offset="70%" style="stop-color:#1e3a5f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="15%" r="45%">
      <stop offset="0%" style="stop-color:#7c6cf0;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g3" cx="70%" cy="90%" r="50%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.25"/>
